<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F2F2F4"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FF5A1F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF5A1F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#FFC896" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFC896" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <path d="M0 0 L1200 0 M0 100 L1200 100 M0 200 L1200 200 M0 300 L1200 300 M0 400 L1200 400 M0 500 L1200 500 M0 600 L1200 600" stroke="#0A0A0F" stroke-width="1"/>
    <path d="M0 0 L0 630 M120 0 L120 630 M240 0 L240 630 M360 0 L360 630 M480 0 L480 630 M600 0 L600 630 M720 0 L720 630 M840 0 L840 630 M960 0 L960 630 M1080 0 L1080 630" stroke="#0A0A0F" stroke-width="1"/>
  </g>

  <!-- Logo mark + wordmark top-left -->
  <g transform="translate(72, 72)">
    <rect x="3" y="3" width="44" height="44" rx="12" stroke="#0A0A0F" stroke-width="2.5" fill="none"/>
    <path d="M14 40 L40 14" stroke="#0A0A0F" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="14" r="4" fill="#0A0A0F"/>
    <text x="68" y="36" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#0A0A0F" letter-spacing="-0.5">Urban Cairn</text>
  </g>

  <!-- Eyebrow -->
  <text x="72" y="280" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="3" fill="#FF5A1F" font-weight="500">A STUDIO FOR AMBITIOUS OPERATORS</text>

  <!-- Headline -->
  <text x="72" y="370" font-family="Inter, system-ui, sans-serif" font-size="86" font-weight="800" fill="#0A0A0F" letter-spacing="-3.5">Software that</text>
  <text x="72" y="460" font-family="Instrument Serif, serif" font-style="italic" font-size="86" font-weight="500" fill="#FF5A1F" letter-spacing="-2">ships outcomes.</text>

  <!-- Footer -->
  <text x="72" y="550" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#4A4A55">14-day delivery · 100% code ownership · Anand, Gujarat</text>
  <text x="72" y="585" font-family="JetBrains Mono, monospace" font-size="14" fill="#8A8A95" letter-spacing="1.5">UDYAM-GJ-03-0077762 · MSME VERIFIED</text>

  <!-- Decorative cairn hint top-right -->
  <g transform="translate(1080, 200)" opacity="0.85">
    <rect x="-3" y="-3" width="80" height="80" rx="22" stroke="#FF5A1F" stroke-width="3" fill="none"/>
    <path d="M14 70 L66 18" stroke="#FF5A1F" stroke-width="3" stroke-linecap="round"/>
    <circle cx="66" cy="18" r="7" fill="#FF5A1F"/>
  </g>
